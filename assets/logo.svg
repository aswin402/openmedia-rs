<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="100%" height="100%">
  <!-- Definitions of Gradients, Glows, and Filters -->
  <defs>
    <!-- Premium Neon Gradients -->
    <linearGradient id="cyber-cyan-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" /> <!-- Cyan -->
      <stop offset="50%" stop-color="#9b51e0" /> <!-- Violet/Purple -->
      <stop offset="100%" stop-color="#4facfe" /> <!-- Deep Blue -->
    </linearGradient>
    <linearGradient id="neon-glow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f857a6" /> <!-- Hot Pink -->
      <stop offset="100%" stop-color="#ff5858" /> <!-- Vibrant Red/Orange -->
    </linearGradient>
    
    <!-- Deep Space radial background glow -->
    <radialGradient id="space-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b51e0" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#00f2fe" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="ultra-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animation styles */
    .bg-circle {
      fill: url(#space-glow);
    }
    .spin-clockwise {
      transform-origin: 160px 160px;
      animation: rotate-cw 20s linear infinite;
    }
    .spin-counter {
      transform-origin: 160px 160px;
      animation: rotate-ccw 15s linear infinite;
    }
    .shutter-rotate {
      transform-origin: 160px 160px;
      animation: rotate-cw 40s linear infinite;
    }
    .pulse-core {
      transform-origin: 160px 160px;
      animation: pulse-animation 3s ease-in-out infinite;
    }
    .wave-offset-1 {
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: flow-wave 5s linear infinite;
    }
    .wave-offset-2 {
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: flow-wave 7s linear infinite reverse;
    }
    .orbit-particle {
      transform-origin: 160px 160px;
      animation: rotate-cw 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    @keyframes rotate-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes rotate-ccw {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulse-animation {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.4)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(248, 87, 166, 0.7)); }
    }
    @keyframes flow-wave {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Dark mode container card styling -->
  <rect width="320" height="320" rx="40" fill="#0d111d" />

  <!-- Ambient Space Glow -->
  <circle cx="160" cy="160" r="140" class="bg-circle" />

  <!-- Outer Tech Ring: Dotted segment (Spinning CCW) -->
  <circle cx="160" cy="160" r="135" class="spin-counter"
          fill="none" stroke="url(#cyber-cyan-pink)" stroke-width="1.5" 
          stroke-dasharray="4 8 16 8 64 12" stroke-opacity="0.3" />

  <!-- Second Tech Ring: Segmented Solid (Spinning CW) -->
  <circle cx="160" cy="160" r="122" class="spin-clockwise"
          fill="none" stroke="url(#neon-glow-grad)" stroke-width="2" 
          stroke-dasharray="120 40 80 40" stroke-opacity="0.5" />

  <!-- Rust stylized mechanical outer nodes (Spinning CW) -->
  <g class="spin-clockwise" opacity="0.35">
    <circle cx="160" cy="40" r="4" fill="#00f2fe" />
    <circle cx="280" cy="160" r="4" fill="#00f2fe" />
    <circle cx="160" cy="280" r="4" fill="#00f2fe" />
    <circle cx="40" cy="160" r="4" fill="#00f2fe" />
    <!-- Diagonal spokes/gear ticks -->
    <line x1="160" y1="40" x2="160" y2="52" stroke="#00f2fe" stroke-width="2" />
    <line x1="280" y1="160" x2="268" y2="160" stroke="#00f2fe" stroke-width="2" />
    <line x1="160" y1="280" x2="160" y2="268" stroke="#00f2fe" stroke-width="2" />
    <line x1="40" y1="160" x2="52" y2="160" stroke="#00f2fe" stroke-width="2" />
  </g>

  <!-- Waveform 1: Synthesizer frequency wave (flowing horizontally) -->
  <path class="wave-offset-1" 
        d="M 50 160 C 85 110, 115 210, 160 160 C 205 110, 235 210, 270 160" 
        fill="none" 
        stroke="url(#cyber-cyan-pink)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-opacity="0.75" 
        filter="url(#ultra-glow)" />

  <!-- Waveform 2: Out of phase overlaying wave -->
  <path class="wave-offset-2" 
        d="M 50 160 C 85 210, 115 110, 160 160 C 205 210, 235 110, 270 160" 
        fill="none" 
        stroke="url(#neon-glow-grad)" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-opacity="0.6" 
        filter="url(#ultra-glow)" />

  <!-- Interactive Camera Aperture Shutter representation -->
  <g class="shutter-rotate" opacity="0.4">
    <!-- Curved blades -->
    <path d="M 160 90 A 70 70 0 0 1 230 160 L 210 160 A 50 50 0 0 0 160 110 Z" fill="url(#cyber-cyan-pink)" />
    <path d="M 230 160 A 70 70 0 0 1 160 230 L 160 210 A 50 50 0 0 0 210 160 Z" fill="url(#cyber-cyan-pink)" />
    <path d="M 160 230 A 70 70 0 0 1 90 160 L 110 160 A 50 50 0 0 0 160 210 Z" fill="url(#cyber-cyan-pink)" />
    <path d="M 90 160 A 70 70 0 0 1 160 90 L 160 110 A 50 50 0 0 0 110 160 Z" fill="url(#cyber-cyan-pink)" />
  </g>

  <!-- Glowing Core Platform (Pulsing) -->
  <circle cx="160" cy="160" r="48" class="pulse-core"
          fill="none" stroke="url(#cyber-cyan-pink)" stroke-width="3.5" 
          filter="url(#ultra-glow)" />

  <!-- Inner Play/Prism Vector (Video symbol) -->
  <g class="pulse-core">
    <path d="M 148 132 L 186 160 L 148 188 Z" 
          fill="url(#neon-glow-grad)" 
          stroke="#ffffff" 
          stroke-width="1.5" 
          stroke-linejoin="round"
          filter="url(#ultra-glow)" />
  </g>

  <!-- Orbiting Satellite Indicator (High speed playhead tracker) -->
  <circle class="orbit-particle" cx="160" cy="40" r="5" fill="#ffffff" filter="url(#ultra-glow)" />
  <circle class="orbit-particle" cx="160" cy="280" r="3.5" fill="#00f2fe" filter="url(#ultra-glow)" />
</svg>
