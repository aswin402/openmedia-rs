name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: openmedia-mcp-linux-x86_64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: openmedia-mcp-mac-x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: openmedia-mcp-mac-arm64
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: openmedia-mcp-windows-x86_64.exe
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build binary
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --bin openmedia-mcp --target ${{ matrix.target }}

      - name: Build binary via Cross
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross.git
          cross build --release --bin openmedia-mcp --target ${{ matrix.target }}

      - name: Package Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.artifact_name }}.tar.gz openmedia-mcp
          cd ../../..

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          powershell Compress-Archive -Path openmedia-mcp.exe -DestinationPath ../../../${{ matrix.artifact_name }}.zip
          cd ../../..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-binary
          path: |
            *.tar.gz
            *.zip

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release assets
        run: |
          mkdir -p release_assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release_assets/ \;
          ls -l release_assets/

      - name: Generate Release Notes
        run: |
          echo "## OpenMedia-RS ${{ github.ref_name }} Release" > release_notes.md
          echo "" >> release_notes.md
          echo "Offline-first Model Context Protocol (MCP) server suite giving AI agents the power to generate, process, and refine visual media." >> release_notes.md
          echo "" >> release_notes.md
          echo "### Supported Platforms:" >> release_notes.md
          echo "- **Linux (x86_64)**: Static musl build" >> release_notes.md
          echo "- **macOS (x86_64 & Apple Silicon arm64)**: Native darwin binaries" >> release_notes.md
          echo "- **Windows (x86_64)**: Static MSVC binary" >> release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
